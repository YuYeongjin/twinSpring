spring.application.name=twinSpring
totp.setup-password=${TOTP_SETUP_PASSWORD:}
spring.web.resources.add-mappings=true

# DB
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/digital_twin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Abcd1234}

spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# MyBatis
mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.type-aliases-package=yyj.project.twinspring.dto

# External
bim.server.url=${BIM_SERVER_URL:http://localhost:5112}
detect.server.url=${DETECT_SERVER_URL:http://localhost:5001}
mqtt.broker.url=${MQTT_BROKER_URL:tcp://192.168.219.103:1883}
mqtt.topic=${MQTT_TOPIC:test/topic}
agent.server.url=${AGENT_URL:http://localhost:7070}
ollama.url=${OLLAMA_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:qwen2.5:3b}
# nginx access.log 경로 (비워두면 /host/nginx-logs/access.log → /var/log/nginx/access.log 순으로 자동 탐색)
nginx.access.log=${NGINX_ACCESS_LOG:}

logging.level.yyj.project.twinspring=INFO

# Object Storage (MinIO / S3 API 호환)
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
storage.bucket=${STORAGE_BUCKET:twinspring}

# Multipart 파일 업로드 제한 (IFC 파일은 최대 200MB 허용)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# Settings tab access control (comma-separated IPs)
settings.allowed-ips=${SETTINGS_ALLOWED_IPS:192.168.219.1}

# OpenWeatherMap API
weather.api.key=${OPENWEATHER_API_KEY:}
weather.api.url=https://api.openweathermap.org/data/2.5

# Raspberry Pi Alert LED
raspi.alert.url=${RASPI_ALERT_URL:http://192.168.219.103:5050}
alert.temp.max=${ALERT_TEMP_MAX:35.0}
alert.temp.min=${ALERT_TEMP_MIN:0.0}
alert.hum.max=${ALERT_HUM_MAX:80.0}
alert.hum.min=${ALERT_HUM_MIN:20.0}