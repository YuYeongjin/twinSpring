version: '3.3'
services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_PASSWORD: "Abcd1234"
      POSTGRES_DB: "digital_twin"
      POSTGRES_USER: "postgres"
    volumes:
      - ./postgresql_data:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:2.0
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    restart: always
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  bim-api:
    image: yeongjin95/twin-bim:latest
    restart: always
    depends_on:
      - db
    ports:
      - "5112:5112"
    environment:
      ConnectionStrings__PostgreSQLConnection: "Host=db;Port=5432;Database=digital_twin;Username=postgres;Password=Abcd1234;"
      ASPNETCORE_URLS: "http://+:5112"

  sensor:
    image: yeongjin95/twin-sensor:latest
    restart: always
    privileged: true
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
    depends_on:
      - mqtt
    environment:
      MQTT_BROKER: mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC: "test/topic"

  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    # 라즈베리파이 ARM64 지원 (ollama/ollama 이미지는 arm64 포함)

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - ollama
      - db
    ports:
      - "7070:7070"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: qwen2.5:3b
      VECTOR_DB_HOST: db
      VECTOR_DB_PORT: "5432"
      VECTOR_DB_NAME: digital_twin
      VECTOR_DB_USER: postgres
      VECTOR_DB_PASSWORD: "Abcd1234"
      SPRING_BASE_URL: http://app:8080

  detect:
    build:
      context: ./detect
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - app
    ports:
      - "5001:5001"
    environment:
      SPRING_URL: http://app:8080
      YOLO_MODEL: yolov8n.pt

  app:
    image: yeongjin95/twin-spring:latest
    restart: always
    depends_on:
      - db
      - mqtt
      - bim-api
      - agent
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/digital_twin
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "Abcd1234"
      MQTT_BROKER_URL: tcp://mqtt:1883
      MQTT_TOPIC: test/topic
      BIM_SERVER_URL: http://bim-api:5112
      AGENT_URL: http://agent:7070
      DETECT_SERVER_URL: http://detect:5001
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./npm_data:/data
      - ./npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - app