version: '3.3'
services:
  db:
    image: biarms/mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "Abcd1234"
      MYSQL_DATABASE: "digital_twin"
    volumes:
      - ./mysql_data:/var/lib/mysql

  mqtt:
    image: eclipse-mosquitto:2.0
    restart: always
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"

  bim-api:
    image: yeongjin95/twin-bim:latest
    restart: always
    depends_on:
      - db
    ports:
      - "5112:5112"
    environment:
      ConnectionStrings__MySqlConnection: "server=db;port=3306;database=digital_twin;user=root;password=Abcd1234;"
      ASPNETCORE_URLS: "http://+:5112"

  sensor:
    image: yeongjin95/twin-sensor:latest
    restart: always
    privileged: true
    devices:
      - "/dev/gpiomem:/dev/gpiomem"
    depends_on:
      - mqtt
    environment:
      MQTT_BROKER: mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC: "test/topic"

  app:
    image: yeongjin95/twin-spring:latest
    restart: always
    depends_on:
      - db
      - mqtt
      - bim-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/digital_twin
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "Abcd1234"
      MQTT_BROKER_URL: tcp://mqtt:1883
      BIM_SERVER_URL: http://bim-api:5112
