spring.application.name=twinSpring
spring.web.resources.add-mappings=true

# ── Database ─────────────────────────────────────────────────────────────────
# 운영 환경에서는 환경변수로 오버라이드하세요:
#   SPRING_DATASOURCE_PASSWORD=<실제 비밀번호>
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/digital_twin}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Abcd1234}

# ── H2 콘솔 (개발 전용 — 운영 환경에서는 반드시 false) ──────────────────────
spring.h2.console.enabled=false

# ── JPA (MariaDB 사용 중 → H2Dialect 제거) ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ── MyBatis ──────────────────────────────────────────────────────────────────
mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.type-aliases-package=yyj.project.twinspring.dto

# ── 외부 서버 URL ─────────────────────────────────────────────────────────────
bim.server.url=${BIM_SERVER_URL:http://localhost:5112}
mqtt.broker.url=${MQTT_BROKER_URL:tcp://192.168.219.108:1883}
mqtt.topic=${MQTT_TOPIC:test/topic}

# ── 로깅 ──────────────────────────────────────────────────────────────────────
logging.level.yyj.project.twinspring=INFO
#logging.level.org.springframework.integration.mqtt=DEBUG
#logging.level.org.eclipse.paho.client.mqttv3=DEBUG
