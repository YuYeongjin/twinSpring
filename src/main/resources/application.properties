spring.application.name=twinSpring
spring.web.resources.add-mappings=true

# DB
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/digital_twin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Abcd1234}

spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# MyBatis
mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.type-aliases-package=yyj.project.twinspring.dto

# External
bim.server.url=${BIM_SERVER_URL:http://localhost:5112}
detect.server.url=${DETECT_SERVER_URL:http://localhost:5001}
mqtt.broker.url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.topic=${MQTT_TOPIC:test/topic}
agent.url=${AGENT_URL:http://localhost:7070}

logging.level.yyj.project.twinspring=INFO

# Raspberry Pi Alert LED
raspi.alert.url=${RASPI_ALERT_URL:http://192.168.219.103:5050}
alert.temp.max=${ALERT_TEMP_MAX:35.0}
alert.temp.min=${ALERT_TEMP_MIN:0.0}
alert.hum.max=${ALERT_HUM_MAX:80.0}
alert.hum.min=${ALERT_HUM_MIN:20.0}