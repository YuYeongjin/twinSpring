name: CI - Build and Push to Docker Hub

on:
  push:
    branches: [ master ] 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Java 환경 설정 및 빌드
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      # 1-1. 프론트엔드 빌드 (Node.js 환경 구축 및 빌드)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./front
        run: |
          npm install
          CI=false npm run build

      # 1-2. Spring Boot Maven 빌드
      - name: Build Spring Boot
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # 2. .NET 환경 설정 및 Publish (아키텍처별 3번 수행)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish twinBIM
        run: |
          dotnet publish twinBIM/twinBIM.csproj -c Release -r linux-arm   --self-contained true -o twinBIM/publish-arm
          dotnet publish twinBIM/twinBIM.csproj -c Release -r linux-arm64 --self-contained true -o twinBIM/publish-arm64
          dotnet publish twinBIM/twinBIM.csproj -c Release -r linux-x64   --self-contained true -o twinBIM/publish-amd64

      # 3. Docker 멀티 아키텍처 빌드 설정
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 이미지 빌드 및 푸시 (에뮬레이션 없이 COPY만 하도록 설정됨)
      - name: Build and Push twin-spring
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: yeongjin95/twin-spring:latest

      - name: Build and Push twin-bim
        uses: docker/build-push-action@v5
        with:
          context: ./twinBIM
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: yeongjin95/twin-bim:latest
          
      - name: Build and Push twin-agent
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: yeongjin95/twin-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
